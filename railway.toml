# Railway — FastAPI backend (Dockerfile.backend, repo root as service root).
#
# Dashboard checklist:
#   1. New Project → Deploy from GitHub → select this repo (root directory: /).
#   2. Variables → add EULERPOOL_API_KEY (required for live data).
#   3. Volumes → New Volume → mount path exactly: /app/data
#      (SQLite at data/stock_analysis.db, parquet cache, joblib models).
#   4. Generate public URL (Settings → Networking) and set GitHub secret
#      VITE_API_BASE_URL to that origin, no trailing slash (GitHub Pages build).
#
# Optional variable DATABASE_URL overrides the default SQLite URL (same driver
# must be installed; default is sqlite+aiosqlite:///data/stock_analysis.db).
#
# Frontend: GitHub Actions workflow builds static assets; or a second Railway
# service with frontend/Dockerfile + VITE_API_BASE_URL build arg.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.backend"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"

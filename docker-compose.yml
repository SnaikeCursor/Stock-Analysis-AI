# Stock Analysis AI — local / demo stack
# Backend: FastAPI + uvicorn | Frontend: nginx (SPA) proxying /api → backend
#
# Usage:
#   docker compose up --build
#   UI: http://localhost:8080   API: http://localhost:8000 (or /api via UI origin)
#
# Persist SQLite, regime joblib cache, and OHLCV parquet under ./data

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - stock_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        NGINX_CONF: nginx.compose.conf
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  stock_data:

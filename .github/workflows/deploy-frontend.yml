# Build Vite SPA and deploy `frontend/dist` to GitHub Pages.
# Configure repository secret `VITE_API_BASE_URL` (Railway API origin, no trailing slash).
# Optional repository variable `VITE_BASE_PATH` overrides auto base (use `/` for user site repos).

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set Vite base path
        id: vite_base
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          OWNER: ${{ github.repository_owner }}
          VAR_BASE: ${{ vars.VITE_BASE_PATH }}
        run: |
          if [ -n "$VAR_BASE" ]; then
            echo "path=$VAR_BASE" >> "$GITHUB_OUTPUT"
          elif [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$REPO_NAME/" >> "$GITHUB_OUTPUT"
          fi

      - name: Install and build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_BASE_PATH: ${{ steps.vite_base.outputs.path }}
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
